# Map-frame vertex positions (same coordinates as leg YAML waypoints).
# Layout:
#   1 -------- 4
#   |          |
#   2 -------- 3
#
# autonomy_stack_go2 uses the stack startup pose as its local origin.
# waypoint_manager subtracts that origin vertex position before publishing.
frame_id: map
vertices:
  1:
    x: 0.0
    y: 0.0
    yaw: 0.0
  2:
    x: 0.0
    y: 0.0
    yaw: 0.0
  3:
    x: 0.0
    y: 0.0
    yaw: 0.0
  4:
    x: 0.0
    y: 0.0
    yaw: 0.0
